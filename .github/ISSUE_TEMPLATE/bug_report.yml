name: Bug Report
description: File a bug report to help us improve yo
title: "[Bug]: "
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report. The more detail you provide, the easier it is to diagnose and fix.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: The character doesn't move when clicking the ground after...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Start dev server with `bun run dev`
        2. Click on the ground plane at position X
        3. Character stays in place / console shows warning
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Please provide details about your setup.
      value: |
        - OS: [e.g. macOS 15, Windows 11]
        - Browser: [e.g. Chrome 125, Safari 18]
        - Device: [e.g. iPhone 15, MacBook Pro M3]
        - bun version: `bun --version`
    validations:
      required: true

  - type: dropdown
    id: assets
    attributes:
      label: Assets
      description: Which character/animation setup are you using?
      options:
        - Stacy model (pmndrs example)
        - Custom Mixamo character
        - Other (describe in description)
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs / Console Output
      description: Copy and paste any relevant logs. This will be auto-formatted.
      render: shell
